<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC Fantasy Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=1.0.1" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo-wrap">
        <img
          class="header-logo"
          src="/assets/header-img.jpg"
          alt="League logo"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
        />
        <div class="header-logo-placeholder" aria-hidden="true">
          <span>⚽</span>
        </div>
      </div>
      <div class="header-text">
        <p class="header-eyebrow">Fantasy Draft</p>
        <h1 class="header-title">FIFA World Cup 2026</h1>
        <p class="header-subtitle">Leaderboard</p>
      </div>
    </div>
  </header>

  <main class="main-container">
    <div class="leaderboard-header">
      <div class="lh-cols">
        <span class="lh-rank">Rank</span>
        <span class="lh-name">Player</span>
        <span class="lh-record">Record</span>
        <span class="lh-pts">Points</span>
      </div>
    </div>
    <div id="app" class="leaderboard" role="list" aria-label="Leaderboard">
      <!-- Rows injected by app.js -->
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
